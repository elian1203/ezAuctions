name: build

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # We need to checkout all tags for the version to be calculated correctly
      - name: Checkout with all tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Use tag as Maven version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "MAVEN_REVISION=-Drevision=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Project
        run: mvn --batch-mode --update-snapshots verify $MAVEN_REVISION

      - name: Upload jar to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ezAuctions.jar
          path: target/ezAuctions.jar
