name: build

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # We need to checkout all tags for the version to be calculated correctly
      - name: Checkout with all tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: '6.7.0'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1.1.1

      - name: Build Project
        run: mvn --batch-mode --update-snapshots verify -Drevision="${{ steps.gitversion.outputs.semVer }}"

      - name: Upload jar to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ezAuctions.jar
          path: target/ezAuctions.jar
