name: upload-release-artifact

on:
  release:
    types: [published]

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      # We need to checkout the main branch with all tags for the version to be calculated correctly
      - name: Checkout main with all tags
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Project
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: mvn --batch-mode --update-snapshots verify -Drevision="${RELEASE_TAG#v}"

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release upload ${{ github.event.release.tag_name }} target/ezAuctions.jar
