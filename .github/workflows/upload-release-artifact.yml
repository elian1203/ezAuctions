name: upload-release-artifact

on:
  release:
    types: [published]

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      # We need to checkout the main branch with all tags for the version to be calculated correctly
      - name: Checkout with all tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.0'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Build Project
        run: mvn --batch-mode --update-snapshots verify -Drevision="${{ steps.gitversion.outputs.semVer }}"

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release upload ${{ github.event.release.tag_name }} target/ezAuctions.jar
